<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking Summary — Constant & Co</title>
    <meta name="description" content="Appointment booking summary for Constant & Co." />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <a href="#main" class="skip">Skip to content</a>

    <main id="main">
        <section class="appointment-hero">
            <div class="container">
                <div class="eyebrow">Booking Confirmed</div>
                <h1 class="appointment-title">Booking Summary</h1>
                <p class="appointment-sub">
                    Your appointment request has been submitted successfully.
                </p>
            </div>
        </section>

        <section class="appointment-section">
            <div class="container">
                <div class="auth-card appointment-form-clean summary-card">
                    <h2 class="appointment-form-title">Appointment Details</h2>

                    <div class="summary-grid">
                        <p><strong>Name:</strong> <span id="summaryName">-</span></p>
                        <p><strong>Email:</strong> <span id="summaryEmail">-</span></p>
                        <p><strong>Phone:</strong> <span id="summaryPhone">-</span></p>
                        <p><strong>Business Name:</strong> <span id="summaryCompany">-</span></p>
                        <p><strong>Service:</strong> <span id="summaryService">-</span></p>
                        <p><strong>Meeting Type:</strong> <span id="summaryMeetingType">-</span></p>
                        <p><strong>Date:</strong> <span id="summaryDate">-</span></p>
                        <p><strong>Time:</strong> <span id="summaryTime">-</span></p>
                        <p><strong>Cost:</strong> <span id="summaryCost">-</span></p>
                        <p><strong>Notes:</strong> <span id="summaryNotes">-</span></p>
                    </div>

                    <div class="summary-actions">
                        <a href="./appointment.html" class="btn btn-primary">Book Another Appointment</a>
                        <button type="button" class="btn btn-ghost" id="backHomeBtn">Back to Home</button>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <script src="booking-summary.js"></script>
</body>

</html>
