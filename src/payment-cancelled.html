<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Constant & Co</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="nav container">
            <div class="brand">
                <a href="index.html">
                    <img src="https://constantandco.com.au/wp-content/uploads/2022/09/Logo-New.png"
                        alt="Constant & Co logo">
                </a>
            </div>
            <div class="menu">
                <a href="client-dashboard.html" class="top-link">Dashboard</a>
                <a class="btn btn-ghost" href="login.html">Sign Up / Login</a>
            </div>
        </nav>
    </header>

    <main class="payment-cancel-page">
        <section class="payment-cancel-shell container">
            <div class="payment-cancel-card">

                <div class="payment-cancel-icon-wrap">
                    <div class="payment-cancel-icon">✕</div>
                </div>

                <p class="payment-cancel-eyebrow">Payment Not Completed</p>
                <h1 class="payment-cancel-title">Payment Cancelled</h1>
                <p class="payment-cancel-sub">
                    Your payment was not completed. No charges have been made to your account.
                </p>

                <div class="payment-cancel-summary">
                    <div class="payment-cancel-row">
                        <span>Status</span>
                        <strong class="payment-cancel-status">Cancelled</strong>
                    </div>
                    <div class="payment-cancel-row">
                        <span>Reason</span>
                        <strong>Payment was interrupted or cancelled</strong>
                    </div>
                    <div class="payment-cancel-row">
                        <span>Next Step</span>
                        <strong>You can retry the payment anytime</strong>
                    </div>
                </div>

                <div class="payment-cancel-actions">
                    <a href="payment.html" class="btn btn-primary">Try Again</a>
                    <a href="client-dashboard.html" class="btn btn-ghost">Back to Dashboard</a>
                </div>

            </div>
        </section>
    </main>

</body>

</html>
