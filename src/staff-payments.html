<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Constant & Co</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="client-portal-page staff-portal-page">

    <aside class="client-sidebar">

        <div class="client-sidebar-logo">
            <a href="index.html">
                <img src="https://constantandco.com.au/wp-content/uploads/2022/09/Logo-New.png" alt="Constant & Co">
            </a>
            <p>Staff Portal</p>
        </div>

        <nav class="client-sidebar-nav">
            <a href="staff-dashboard.html" >Dashboard</a>
            <a href="staff-appointments.html">Appointments</a>
            <a href="staff-clients.html">Clients</a>
            <a href="staff-leave.html">Leave Requests</a>
            <a href="staff-conversations.html">Conversations</a>
            <a href="staff-transfers.html">Transfers</a>
            <a href="staff-payments.html" class="active">Payments</a>
        </nav>

        <div class="client-sidebar-user">
            <strong id="staffNameSidebar">Staff</strong>
            <small id="staffEmailSidebar"></small>

            <a href="#" id="logoutBtn" class="client-logout-link">
                Logout
            </a>
        </div>

    </aside>


    <div class="client-portal-content">

        <header class="client-topbar">

            <button id="sidebarToggleBtn" class="client-menu-btn" type="button">

                ☰

            </button>

            <p>Payments</p>

        </header>

        <main class="client-main">

            <section class="client-page-heading">
                <h1>Payment History</h1>
                <p>Client payments linked to your appointments.</p>
            </section>

            <section class="client-panel">

                <table class="client-table">

                    <thead>

                        <tr>
                            <th>Client</th>
                            <th>Service</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Payment Date</th>
                        </tr>

                    </thead>

                    <tbody id="paymentHistoryTable">

                        <tr>
                            <td colspan="5">
                                Loading payment history...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </section>

        </main>

    </div>

    <script src="staff-portal.js" defer></script>
    <script src="staff-payments.js" defer></script>
</body>

</html>
