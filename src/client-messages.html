<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Constant & Co</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="client-portal-page">

    <aside class="client-sidebar">
        <div class="client-sidebar-logo">
            <a href="index.html">
                <img src="https://constantandco.com.au/wp-content/uploads/2022/09/Logo-New.png"
                    alt="Constant & Co logo">
            </a>
            <p>Client Portal</p>
        </div>

        <nav class="client-sidebar-nav">
            <a href="client-dashboard.html">Dashboard</a>
            <a href="client-appointments.html">Services</a>
            <a href="client-messages.html" class="active">Messages</a>
            <a href="client-billing.html">Billing</a>
            <a href="client-settings.html">Settings</a>
        </nav>

        <div class="client-sidebar-user">
            <strong id="sidebarClientName">Client</strong>
            <small id="sidebarClientEmail">Logged in</small>
            <a href="login.html" class="client-logout-link">Logout</a>
        </div>
    </aside>

    <div class="client-portal-content">

        <header class="client-topbar">
            <button id="sidebarToggleBtn" class="client-menu-btn" type="button" aria-label="Toggle sidebar">
                ☰
            </button>
            <p>Messages</p>
        </header>

        <main class="client-main">

            <section class="client-chat-shell">

                <!-- LEFT ADVISER PANEL -->
                <aside class="client-chat-people">

                    <div class="chat-people-header">
                        <h2>Conversations</h2>
                        <p>Your assigned Constant &amp; Co adviser</p>
                    </div>

                    <div id="chatPeopleList">
                        <p>Loading conversations...</p>
                    </div>

                </aside>

                <!-- MAIN CHAT AREA -->
                <section class="client-chat-main">

                    <div class="chat-header">
                        <div>
                            <h1 id="chatStaffName">Assigned Adviser</h1>
                            <p id="chatServiceName">Service conversation</p>
                        </div>
                    </div>

                    <div id="clientMessagesList" class="chat-message-list">
                        <p>No messages found.</p>
                    </div>

                    <!-- DOCUMENT POPUP -->
                    <div id="documentUploadPanel" class="chat-upload-panel is-hidden">

                        <div class="chat-upload-head">
                            <div>
                                <h3>Add Documents</h3>
                                <p>Upload one or more files for this service.</p>
                            </div>

                            <button type="button" id="closeDocumentPanel" class="chat-icon-btn">
                                ×
                            </button>
                        </div>

                        <form id="chatDocumentUploadForm" enctype="multipart/form-data">

                            <label for="chatDocumentService">
                                Service
                            </label>

                            <select id="chatDocumentService" class="input-lg" required>
                                <option value="">Select service</option>
                            </select>

                            <label for="chatDocumentFiles">
                                Documents
                            </label>

                            <input id="chatDocumentFiles" type="file" name="files" multiple required>

                            <button type="submit" class="btn btn-primary upload-btn-small">
                                Upload Documents
                            </button>

                            <p id="chatDocumentUploadStatus" class="small"></p>

                        </form>

                    </div>

                    <!-- MESSAGE COMPOSER -->
                    <form id="clientMessageForm" class="chat-composer">

                        <button id="openDocumentPanel" type="button" class="chat-plus-btn" aria-label="Add documents">
                            +
                        </button>

                        <textarea id="clientMessageText" placeholder="Type your message..." required></textarea>

                        <button type="submit" class="btn btn-primary chat-send-btn">
                            Send
                        </button>

                    </form>

                    <p id="clientMessageStatus" class="small"></p>

                </section>

            </section>

        </main>

    </div>

    <script src="dashboard.js" defer></script>

</body>

</html>
