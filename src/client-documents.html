<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Constant & Co</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="client-portal-page">

    <div class="client-portal-content documents-page-simple">

        <header class="client-topbar">

            <div class="documents-topbar-left">
                <a href="client-dashboard.html" class="btn btn-ghost">
                    ← Back to Dashboard
                </a>
            </div>

            <p>Documents</p>

        </header>

        <main class="client-main">

            <section class="client-page-heading">
                <h1>Document History</h1>
                <p>
                    View all uploaded accounting, tax, payroll, and advisory documents.
                </p>
            </section>

            <section class="client-panel">

                <div class="client-panel-head">
                    <div>
                        <h2>Document Library</h2>
                        <p>Your uploaded documents and records.</p>
                    </div>
                </div>

                <div id="recordsList" class="records-list">
                    <p>No records found yet.</p>
                </div>

            </section>

        </main>

    </div>

    <script src="dashboard.js" defer></script>

</html>
