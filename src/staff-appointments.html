<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - Constant & Co</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="client-portal-page staff-portal-page">

    <aside class="client-sidebar">

        <div class="client-sidebar-logo">
            <a href="index.html">
                <img src="https://constantandco.com.au/wp-content/uploads/2022/09/Logo-New.png" alt="Constant & Co">
            </a>
            <p>Staff Portal</p>
        </div>

        <nav class="client-sidebar-nav">
            <a href="staff-dashboard.html">Dashboard</a>
            <a href="staff-appointments.html" class="active">Appointments</a>
            <a href="staff-clients.html">Clients</a>
            <a href="staff-conversations.html">Conversations</a>
            <a href="staff-transfers.html">Transfers</a>
            <a href="staff-payments.html">Payments</a>
        </nav>

        <div class="client-sidebar-user">
            <strong id="staffNameSidebar">Staff</strong>
            <small id="staffEmailSidebar"></small>

            <a href="#" id="logoutBtn" class="client-logout-link">
                Logout
            </a>
        </div>

    </aside>

    <div class="client-portal-content">

        <header class="client-topbar">
            <button id="sidebarToggleBtn" class="client-menu-btn" type="button">
                ☰
            </button>

            <p>Appointments</p>
        </header>

        <main class="client-main">

            <section class="client-panel staff-appointment-panel">
                <h2>Upcoming Appointments</h2>

                <table class="client-table">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="upcomingStaffAppointmentsTable">
                        <tr>
                            <td colspan="6">Loading appointments...</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="client-panel staff-appointment-panel">
                <h2>Completed / Cancelled Appointments</h2>

                <table class="client-table">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="pastStaffAppointmentsTable">
                        <tr>
                            <td colspan="6">Loading appointments...</td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </main>

    </div>

    <script src="staff-portal.js" defer></script>
    <script src="staff-appointments.js" defer></script>

</body>

</html>
