<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers - Constant & Co</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="client-portal-page staff-portal-page">

    <aside class="client-sidebar">

        <div class="client-sidebar-logo">
            <a href="index.html">
                <img src="https://constantandco.com.au/wp-content/uploads/2022/09/Logo-New.png" alt="Constant & Co">
            </a>
            <p>Staff Portal</p>
        </div>

        <nav class="client-sidebar-nav">
            <a href="staff-dashboard.html" >Dashboard</a>
            <a href="staff-appointments.html">Appointments</a>
            <a href="staff-clients.html">Clients</a>
            <a href="staff-leave.html">Leave Requests</a>
            <a href="staff-conversations.html">Conversations</a>
            <a href="staff-documents.html">Documents</a>
            <a href="staff-transfers.html" class="active">Transfers</a>
            <a href="staff-payments.html">Payments</a>
        </nav>

        <div class="client-sidebar-user">
            <strong id="staffNameSidebar">Staff</strong>
            <small id="staffEmailSidebar"></small>

            <a href="#" id="logoutBtn" class="client-logout-link">
                Logout
            </a>
        </div>

    </aside>


    <div class="client-portal-content">

        <header class="client-topbar">

            <button id="sidebarToggleBtn" class="client-menu-btn" type="button">

                ☰

            </button>

            <p>Transfers</p>

        </header>

        <main class="client-main">

            <section class="client-page-heading">
                <h1>Transfer Requests</h1>
            </section>

            <section class="client-panel">

                <form id="transferRequestForm" class="portal-form">

                    <div class="auth-row">

                        <div>
                            <label>Appointment</label>

                            <select id="transferAppointmentSelect" class="input-lg"></select>
                        </div>

                    </div>

                    <div class="auth-row">

                        <div>
                            <label>Reason</label>

                            <textarea id="transferReason" class="input-lg appointment-textarea"></textarea>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-primary">

                        Submit Transfer

                    </button>

                </form>

            </section>

        </main>

    </div>

    <script src="staff-portal.js" defer></script>
    <script src="staff-transfers.js" defer></script>
</body>

</html>
