<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constant & Co Admin Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin-portal.css" />
</head>

<body>
    <!-- LOGIN -->
    <section class="login-screen" id="loginScreen">
        <nav class="auth-escape-bar auth-escape-bar--inset" aria-label="Leave admin portal">
            <a href="./index.html" class="auth-escape-link">← Back to website</a>
            <a href="./contact.html" class="auth-escape-link auth-escape-link--muted">Contact</a>
        </nav>
        <div class="login-card">
            <div class="login-brand">
                <a href="./index.html" class="login-brand-logo-link" aria-label="Constant & Co — go to website">
                    <img src="https://constantandco.com.au/wp-content/uploads/2022/09/Logo-New.png" alt="">
                </a>
                <h1>Company Portal</h1>
                <p>Constant &amp; Co internal management system</p>
            </div>

            <div id="loginError" class="alert alert-error hidden"></div>

            <form id="internalLoginForm">
                <div class="form-group">
                    <label for="loginEmail">Email address</label>
                    <input class="input" id="loginEmail" type="email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input class="input" id="loginPassword" type="password" required>
                </div>
                <p id="loginStatus"></p>

                <button class="btn btn-primary btn-block" type="submit">Login to dashboard</button>
            </form>
        </div>
    </section>

    <script src="internal-login.js"></script>
</body>

</html>
